name: ci

# CI が緑 = 「掟つきで再現可能」。擬似でない構造的保証（LAW.md §5）。
# (a) core の単体テスト  (b) 各実験 run.py の短縮版を回し result.json と照合。

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: core unit tests + experiment regressions
        run: pytest tests/ -q
      - name: e001 quick run (short, qualitative check)
        run: python experiments/e001_gpe_vortex_precession/run.py --quick --no-write
      - name: e002 quick run (short, qualitative check)
        run: python experiments/e002_gpe_two_vortex/run.py --quick --no-write
      - name: e003 quick run (3D vortex ring propagation)
        run: python experiments/e003_gpe_vortex_ring/run.py --quick --no-write
      - name: e004 quick run (octave hierarchy / holography signatures)
        run: python experiments/e004_octave_holography/run.py --quick --no-write
      - name: e008 quick run (Kibble-Zurek co-emergence)
        run: python experiments/e008_coemergence/run.py --quick --no-write
      - name: e009 X1 quick (persistent toroidal current)
        run: python experiments/e009_exploratory/x1_toroidal_current.py --quick --no-write
      - name: e009 X2 quick (seed growth / morphogenesis)
        run: python experiments/e009_exploratory/x2_seed_growth.py --quick --no-write
      - name: "e010 quick (KZ coherence length; spacing/xi const, 2 sigma = b)"
        run: python experiments/e010_kz_coherence/run.py --quick --no-write
      - name: "e011 pair binding quick (v*d, w*d^2, selectivity)"
        run: python experiments/e011_defect_chemistry/x_pair_binding.py --quick --no-write
      - name: "e011 finite-T dissociation quick (lifetime falls with T)"
        run: python experiments/e011_defect_chemistry/finite_T_dissociation.py --quick --no-write
      - name: "e012 static hopfion quick (Q_H ~ 1, Derrick collapse vs finite L*)"
        run: python experiments/e012_hopf_stabilization/hopfion_static.py --quick --no-write
      - name: "e012 hopfion flow quick (bare collapses; energy monotone)"
        run: python experiments/e012_hopf_stabilization/hopfion_flow.py --quick --no-write
      - name: "e012 hopfion complete-PDE quick (c4>0 holds Q_H ~ 1, self-stabilises)"
        run: python experiments/e012_hopf_stabilization/hopfion_pde.py --quick --no-write
      - name: "e013 vessel+content quick (dead core; inner b vs Pe)"
        run: python experiments/e013_vessel_content/run.py --quick --no-write
      - name: "e013 self-organized convection quick (onset feeds interior)"
        run: python experiments/e013_vessel_content/rayleigh_benard.py --quick --no-write
      - name: "e014 Myrheim-Meyer quick (causal order -> dimension)"
        run: python experiments/e014_causal_dimension/causal_dimension.py --quick --no-write
      - name: "e014 spectral dimension quick (3D geometry d_s ~ 3)"
        run: python experiments/e014_causal_dimension/spectral.py --quick --no-write
      - name: "e015 vessel closure quick (drive -> persist; F->0 -> death)"
        run: python experiments/e015_vessel_closure/vessel_closure.py --quick --no-write
      - name: "e015 two-arm autopoiesis quick (cut either arm -> death)"
        run: python experiments/e015_vessel_closure/autopoiesis.py --quick --no-write
      - name: "e016 hopf basin quick (size=k*sqrt(c4), Q_H=2 held)"
        run: python experiments/e016_hopf_basin/hopf_basin.py --quick --no-write
      - name: "e017 walled RB linear stability quick (Ra_c 1708/657.5 to <0.4%)"
        run: python experiments/e017_walled_convection/rb_linear_stability.py --quick --no-write
      - name: "e017 walled DNS quick (Nu(Ra)>1; interior delivery)"
        run: python experiments/e017_walled_convection/rb_dns.py --quick --no-write
      - name: "e018 three-arm vessel quick (cut any arm/drive -> death)"
        run: python experiments/e018_membrane_vesicle/vessel_membrane.py --quick --no-write
      - name: "e018 phase-field vesicle quick (bounded droplet; cut drive dissolves)"
        run: python experiments/e018_membrane_vesicle/membrane_vesicle.py --quick --no-write
      - name: "e019 coupling quick (circulation carries a particle; U_c)"
        run: python experiments/e019_coupling/coupling.py --quick --no-write
      - name: "e019 three-body coupling quick (metabolism+flow+particle; drive off -> stop)"
        run: python experiments/e019_coupling/three_body.py --quick --no-write
      - name: "e020 vesicle division quick (passive phase-field does NOT divide)"
        run: python experiments/e020_vesicle_division/division.py --quick --no-write
      - name: "e024 ratchet quick (asymmetric potential rectifies symmetric noise)"
        run: python experiments/e024_vessel_engine/ratchet.py --quick --no-write
      - name: "e024 motor quick (three is min rotation; rotor self-spins)"
        run: python experiments/e024_vessel_engine/motor.py --quick --no-write
      - name: "e024 vessel motor quick (fuel -> rotation -> work -> vessel; cutoff -> death)"
        run: python experiments/e024_vessel_engine/vessel_motor.py --quick --no-write
      - name: "e024 robustness quick (gate signs vs seed/Np/dt)"
        run: python experiments/e024_vessel_engine/robustness.py --quick --no-write
      - name: "e025 complete quick (three organs; fuel cut collapses bulk; anti zeroes winding)"
        run: python experiments/e025_vessel_life/complete.py --quick --no-write
      - name: "e025 autopoietic quick (closure couples winding loss to bulk collapse)"
        run: python experiments/e025_vessel_life/autopoietic.py --quick --no-write
      - name: "e026 division quick (winding not copyable; +1 -> (+1,0); needs shed anti)"
        run: python experiments/e026_vessel_division/division.py --quick --no-write
      - name: "e027 evolution quick (mutation adapts; freq-dep diversifies; red queen tracks)"
        run: python experiments/e027_evolution_transition/evolution.py --quick --no-write
      - name: "e027 openended quick (expandable genome + demand raises complexity)"
        run: python experiments/e027_evolution_transition/openended.py --quick --no-write
      - name: "e027 transition quick (spatial cooperation survives; well-mixed collapses)"
        run: python experiments/e027_evolution_transition/transition.py --quick --no-write
      - name: "e028 memory quick (non-local winding, protected, capacity>dof)"
        run: python experiments/e028_topological_memory/memory.py --quick --no-write
      - name: "e028 ring quick (spectral-ETD GL ring: n~round(Phi), gauge-invariant)"
        run: python experiments/e028_topological_memory/ring.py --quick --no-write
      - name: "e021 self-receiver quick (ring reads its own core winding, no external field)"
        run: python experiments/e021_self_receiver/self_receiver.py --quick --no-write
      - name: "e021 vessel-alive quick (winding held under drive; dies to a near anti)"
        run: python experiments/e021_self_receiver/vessel_alive.py --quick --no-write
      - name: "e022 ab-gap quick (AB ring passes only the enclosed flux, gauge-invariant)"
        run: python experiments/e022_horizon_ledger/ab_gap.py --quick --no-write
      - name: "e022 ledger quick (DS molecules: density-independent, horizon-profile only)"
        run: python experiments/e022_horizon_ledger/ledger.py --quick --no-write
      - name: "e023 order-time quick (rank recovers time; finite interval dimension)"
        run: python experiments/e023_causal_action/order_time.py --quick --no-write
      - name: "e023 directed-vs-undirected quick (orientation makes spacetime; undirected small-world)"
        run: python experiments/e023_causal_action/directed_vs_undirected.py --quick --no-write
      - name: "e029 coevolution quick [frontier] (endogenous demand removes the complexity plateau)"
        run: python experiments/e029_openended_frontier/coevolution.py --quick --no-write
      - name: "e029 major-transition quick [frontier] (group reproduction rescues cooperation)"
        run: python experiments/e029_openended_frontier/major_transition.py --quick --no-write
      - name: "e030 division-of-labor quick [frontier] (convex returns drive germ-soma specialization)"
        run: python experiments/e030_division_of_labor/division_of_labor.py --quick --no-write
      - name: "e031 causal-action smearing quick [frontier] (raw BD fluctuates; smearing damps it)"
        run: python experiments/e031_causal_action_smearing/smearing.py --quick --no-write
      - name: "e032 3D DS horizon quick [frontier] (2+1 area law holds; coefficient loses universality)"
        run: python experiments/e032_ds_horizon_3d/horizon_3d.py --quick --no-write
      - name: "e033 field division-of-labor quick (Cahn-Hilliard spinodal decomposition, no agents)"
        run: python experiments/e033_field_division_of_labor/field_division.py --quick --no-write
      - name: "e034 field cooperation-front quick (bistable reaction-diffusion Nagumo front, no agents)"
        run: python experiments/e034_field_cooperation_front/cooperation_front.py --quick --no-write
      - name: "e035 field Red Queen quick (predator-prey Hopf bifurcation, no agents)"
        run: python experiments/e035_field_red_queen/red_queen.py --quick --no-write
      - name: "e036 field adaptation quick (replicator-mutator Crow-Kimura, no agents)"
        run: python experiments/e036_field_adaptation/adaptation.py --quick --no-write
      - name: "e037 ecological PGG quick (persistent cooperation in a pure PDE, no agents)"
        run: python experiments/e037_ecological_pgg/ecological_pgg.py --quick --no-write
      - name: "e038 field objtrack quick (continuous-trait evolution via object tracking, no agents)"
        run: python experiments/e038_field_objtrack/objtrack.py --quick --no-write
      - name: "e039 field differentiation quick (French-flag morphogen + Turing, no agents)"
        run: python experiments/e039_field_differentiation/differentiation.py --quick --no-write
      - name: "e040 field RPS cooperation quick (cyclic-dominance spiral waves, no agents)"
        run: python experiments/e040_field_rps_cooperation/rps_cooperation.py --quick --no-write
      - name: "e041 field bottleneck quick (neck geometry -> clonality, role S)"
        run: python experiments/e041_field_bottleneck/bottleneck.py --quick --no-write
      - name: "e043 field universe quick (division+inheritance+mutation+selection+adaptation+differentiation, role E)"
        run: python experiments/e043_field_universe/universe.py --quick --no-write
      - name: "e044 field unification quick (cooperation joins via a local public good + control, role E)"
        run: python experiments/e044_field_unification/unification.py --quick --no-write
      - name: "e045 field endogenous quick (NEGATIVE: endogenous niche construction does not beat neutral, role N)"
        run: python experiments/e045_field_endogenous/endogenous.py --quick --no-write
      - name: "8th-audit role guard (no target_encoded result may claim an E/V GREEN role)"
        run: python tools/audit_roles.py
      - name: "room + ledgers exist (central lab, Type A-D, working ledger)"
        run: |
          test -f "room/中心実験室.html"
          test -f "docs/現在地と方向性_TypeABCD.md"
          test -f docs/TRUST_MAP.md
          test -f docs/working_ledger/README.md
          test -f docs/working_ledger/H001_hopf_global_newton.md
          test -f docs/working_ledger/H002_membrane_vesicle.md
          test -f docs/working_ledger/H003_three_body_coupling.md
          test -f docs/working_ledger/H004_action_entropy.md
          test -f docs/working_ledger/H005_order_to_spacetime.md
          test -f docs/working_ledger/H009_horizon_ledger.md
          test -f docs/working_ledger/H012_topological_memory.md
          test -f docs/working_ledger/H014_self_receiver.md
          test -f docs/working_ledger/H016_vessel_engine_society.md
          test -f core/holonomy.py
          test -f core/causet.py
          test -f experiments/e025_vessel_life/results/complete.json
          test -f experiments/e025_vessel_life/results/autopoietic.json
          test -f experiments/e026_vessel_division/results/division.json
          test -f experiments/e027_evolution_transition/results/evolution.json
          test -f experiments/e027_evolution_transition/results/transition.json
          test -f experiments/e028_topological_memory/results/memory.json
          test -f experiments/e028_topological_memory/results/ring.json
          test -f experiments/e021_self_receiver/results/self_receiver.json
          test -f experiments/e021_self_receiver/results/vessel_alive.json
          test -f experiments/e022_horizon_ledger/results/ab_gap.json
          test -f experiments/e022_horizon_ledger/results/ledger.json
          test -f experiments/e023_causal_action/results/order_time.json
          test -f experiments/e023_causal_action/results/directed_vs_undirected.json
          test -f experiments/e029_openended_frontier/results/coevolution.json
          test -f experiments/e029_openended_frontier/results/major_transition.json
          test -f experiments/e030_division_of_labor/results/division_of_labor.json
          test -f experiments/e031_causal_action_smearing/results/smearing.json
          test -f experiments/e032_ds_horizon_3d/results/horizon_3d.json
          test -f experiments/e033_field_division_of_labor/results/field_division.json
          test -f experiments/e034_field_cooperation_front/results/cooperation_front.json
          test -f experiments/e035_field_red_queen/results/red_queen.json
          test -f experiments/e036_field_adaptation/results/adaptation.json
          test -f experiments/e037_ecological_pgg/results/ecological_pgg.json
          test -f experiments/e038_field_objtrack/results/objtrack.json
          test -f experiments/e039_field_differentiation/results/differentiation.json
          test -f experiments/e040_field_rps_cooperation/results/rps_cooperation.json
          test -f experiments/e041_field_bottleneck/results/bottleneck.json
          test -f experiments/e043_field_universe/results/universe.json
          test -f experiments/e044_field_unification/results/unification.json
          test -f experiments/e045_field_endogenous/results/endogenous.json
          test -f docs/TRUST_MAP.md
          test -f tools/audit_roles.py
          test -f docs/working_ledger/H017_openended_frontier.md
          test -f docs/working_ledger/H018_frontier_solid.md
          test -f docs/working_ledger/H019_agents_to_fields.md
          test -f docs/working_ledger/H020_fieldification_wave2.md
      - name: "三層移行 docs 群が存在する (PR1: 思想と用語の固定)"
        run: |
          test -f AGENTS.md
          test -f docs/GENESIS_MAP.md
          test -f docs/PHYSICS_INTEGRITY.md
          test -f docs/EMERGENCE_LEVELS.md
          test -f docs/ROOM_MODEL.md
          test -f docs/DIMENSION_POLICY.md
          test -f docs/AI_EXPERIMENT_POLICY.md
          test -f docs/MIGRATION.md
          test -f docs/history/00_grand_map_legacy.md
          test -f docs/00_grand_map.md
          test -f room/README.md
