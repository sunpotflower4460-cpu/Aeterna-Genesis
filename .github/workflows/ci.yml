name: ci

# CI が緑 = 「掟つきで再現可能」。擬似でない構造的保証（LAW.md §5）。
# (a) core の単体テスト  (b) 各実験 run.py の短縮版を回し result.json と照合。

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: core unit tests + e001 regression
        run: pytest tests/ -q
      - name: e001 quick run (short, qualitative check)
        run: python experiments/e001_gpe_vortex_precession/run.py --quick --no-write
