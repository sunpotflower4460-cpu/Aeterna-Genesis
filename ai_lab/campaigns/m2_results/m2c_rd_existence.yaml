# Frontier Campaign M2-C — machine-readable result (GPT M2 addendum §19)
# Three-component reaction-diffusion re-measured with the FULL coupled state (u,v,w bundled), guarded by an
# existence gate. Honest finding: no compact localized STATIONARY single individual in the scanned region ->
# the frontier here is UPSTREAM of drift (existence). N0 no-go. The coupled instrument REFUSES to report a
# drift spectrum where there is no individual; a SH #40 individual is the positive control it accepts.
campaign: M2-C
white: three_component_rd
instrument: genesis/diagnostics/coupled_spectrum.py  # coupled-Jacobian eigen-solver + existence_gate
measured_by: genesis/models/three_component_rd.py::coupled_audit
grid: {N: 96, dx: 1.0, dt: 0.1}
settle_steps: 6000
seed: 1
gate: {res_gate: 0.01, area_max: 0.5, criteria: [single_component, compact_localized, stationary_fixed_point]}

positive_control:
  white: swift_hohenberg   # the #40 variational individual
  gate: PASSED
  count: 1
  area_frac: 0.0149
  rel_res: 0.0
  n_goldstone: 2
  note: the SAME gate that refuses the RD accepts a genuine compact stationary localized individual.

points:
  - {k1: -0.05, count: 0, area_frac: 0.0,   rel_res: 0.0033, gate: REFUSED, reason: no_localized_individual, branch: dies}
  - {k1: -0.02, count: 0, area_frac: 0.0,   rel_res: 0.0034, gate: REFUSED, reason: no_localized_individual, branch: dies}
  - {k1:  0.0,  count: 1, area_frac: 0.396, rel_res: 0.0229, gate: REFUSED, reason: not_stationary,          branch: diffuse_drifting_blob}
  - {k1:  0.02, count: 1, area_frac: 1.0,   rel_res: 0.0036, gate: REFUSED, reason: no_localized_individual, branch: plus_state_fills}
  - {k1:  0.05, count: 1, area_frac: 1.0,   rel_res: 0.0033, gate: REFUSED, reason: no_localized_individual, branch: plus_state_fills}

no_go:
  stage: N0                       # not_found_in_scan (§17)
  level: existence                # UPSTREAM of drift: no static individual to linearise
  white_specific: true
  domain: {k1: [-0.05, 0.05], others: DEFAULTS}
  claim_excludes: [all_parameters_impossible]   # not a universe-wide no-go; scan-specific
  tier: frontier

interpretation:
  measured: >
    In the scanned region the three-component RD has no compact localized stationary single individual:
    the state dies, drifts as a diffuse blob (not stationary), or the "+" state fills the domain. The
    coupled instrument, guarded by the existence gate, refuses to report a drift spectrum -- an honest
    existence-level frontier, not a drift result.
  next: >
    M2-D needs a DISTINCT two-field white that DOES settle to a stable compact localized spot (activator +
    slow recovery; isotropic non-reciprocal; zero initial polarity) so a non-Goldstone m=1 drift mode can
    actually be searched for.
  language: spots != life; a moving/settling field structure is not a living thing (docs/ANTI_DRIFT.md).
