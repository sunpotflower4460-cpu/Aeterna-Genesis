# H021 frontier campaign PR-C（3D渦線計測器のV階層検証）。Hand-authored to match schemas/experiment.schema.json.
# 一次情報: docs/working_ledger/H021_frontier_campaign_0_to_far.md。外部監査（GPT・別Claude）が推奨した
# 3D-native計測器（渦線・閉ループ抽出）の第一弾。既存の seeded vortex ring（e003）で検証する。
id: e059
title: 3D渦線トレーサーの検証（既存seeded vortex ring e003で既存計測器と相互確認、role V）
role:
  primary: V
confidence: C
claim_tier:
- measured
put_in: e003 と完全に同一の damped-free 3D GPE seeded vortex ring セットアップ（一様背景＋imprint済み
  渦リング、虚時間緩和後に実時間伝播）。物理は不変更・再利用のみ。新規追加は診断側のみ
  （genesis/diagnostics/vortex_lines_3d.py の一般用途プラケット磁束渦線トレーサー）
emerged: 合成テスト（既知半径の円環・ゲージ不変性・並進不変性・R=6〜18のロバスト性、外部レビュー対応後の
  回帰テスト2件を含め計6件）は全てPASS。実際にe003のGPE緩和済みリングに適用すると、e003自身の自己検出
  「clean window」（半径バンド逸脱・方向反転で自己終了）の前半では新旧2計測器が良く一致する
  （前半70%のフレームがtolerance内）。ただしclean window後半（音波・ノイズが蓄積する領域）では一致率が
  悪化する（後半27〜36%、外部レビュー対応の修正後も同傾向）——近傍ダングリング半辺の最近傍再接続
  ヒューリスティックが、接線領域の局所ギャップを誤って自己閉合させることがあるという既知の限界
  （AUDIT.md参照）。STATUS はこの理由で厳密には RED（全区間一致率の閾値70%を満たさない）だが、合成テスト・
  early clean window での高い一致という正の結果自体は正直に確立している
seeded_structure: true
dimension:
  computed: 3D
  official_3d: false
  transfer_risk: low
genesis_role: measurement_tool
target_encoded: false
unresolved_audit:
- 【マージ前の外部AIレビュー第3ラウンド（Codex）で発見・修正した3件】(1) `vortex_lines_3d.py`
  の2面貫通「clean」判定が `abs(flux)==1` のみを要件としており、同符号の2面（発散が非ゼロで
  単線の入退場としては物理的に不整合）もそのまま接続していた——両面のフラックスが相殺する
  （符号が逆）ことも要件に追加し、満たさない場合は `n_cubes_overloaded` に計上するよう修正、
  (2) e059本体の `evaluate()` が半径の一致率のみを判定基準にしており、`run()` が記録していた
  軸方向位置系列（new_axial_series/old_axial_series）を実際には一度も比較していなかった
  （`axial_diffs` 変数は宣言されていたが未使用のまま）——同じ半径だが異なるz位置の誤マッチでも
  GREENになり得た欠陥。半径チェックと同じ基準（Rの25%許容・70%多数決、事前に半径チェックと
  揃えて決定、結果を見てからの事後調整ではない）で軸方向一致チェックを追加、(3) 治癒に失敗した
  dangling half-edge のうち、清潔立方体側の接続すら持たない孤立したものは `n_unhealed_dangling`
  にはカウントされるが `open_paths` の幾何情報からは完全に消えていた——1点の open path として
  明示的に含めるよう修正。回帰テスト2件を追加（同符号ペアの検出、孤立ダングリングの1点パス化）。
  修正後にfull runを再実行：半径一致の数値は変化なし（median radius diff = 7.206、前半70%・
  後半27%のまま——これら3件のバグは本データセットでは実際にはトリガーされなかったが、計測器と
  検証基準はより正しくなった）。軸方向一致は新規に85.7%（18/21）でPASS——STATUSは半径一致
  未達のためRedのままだが、判定基準自体が今回初めて完全になった
- 【マージ前の外部AIレビュー（Codex）で発見・修正した5件（重要）】本PR（未マージ時点）にCodexの
  独立した外部AIレビューが届き、5件の具体的な問題を指摘した——(1) `vortex_lines_3d.py` のzx面の
  符号規約が実際には-y（+yと誤って実装）で、yz面とzx面が混在する立方体（曲がった線の接線領域付近で
  頻発）の発散診断が不正確になっていた（右手系の再導出と実データで確認、修正後は56件中32件の
  「発散違反」が消え、残り24件は本来不可避な1面貫通ダングリング立方体のみになった）、(2) この
  experiment.yaml の `seeded_structure` がe003と同じ`false`だったが、本実験はe003と異なり
  「自己形成」の主張を一切せず、リング自体が検出対象として直接imprintされているため`true`が
  正確（e003自身は伝播という創発主張があるため`false`のままで正しい、両者の意味は異なる）、
  (3) `vortex_lines_3d.py` の open_paths 検出が、開いた鎖の内部ノードから歩き始めると1本の鎖を
  複数の断片に誤分割し得た（次数1の真の端点から先に歩くよう順序を修正）、(4) dangling half-edge の
  最近傍再接続に距離上限がなく、理論上は無関係な遠方の欠陥同士を橋渡しし得た
  （`max_heal_distance`パラメータを追加、デフォルト3.0格子単位）、(5) e059本体の時間的連続性
  マッチングが前フレーム重心への最近傍のみで選んでおり、実際のリングが別の場所に存在するのに
  近くの小さなノイズ由来ループへ誤ってロックオンし得た（old trackerの半径が利用可能な場合、
  半径が妥当な範囲内の候補に絞ってから最近傍マッチングするよう修正）。5件とも本PRでの初回実装の
  バグであり、マージ前に見つけて直した——マージ済みの数値を後から訂正したのではない。修正後に
  full runを再実行した結果、前半一致率（70%）は維持されたが後半一致率はさらにやや悪化した
  （36%→27%）——これは修正が「悪化」させたのではなく、複数の分類変更が同じ既知の脆弱な
  healing heuristicの成功/失敗パターンを別のフレーム集合にシフトさせたため（このヒューリスティック
  自体の根本改善——チェーン端点単位での再接続——はまだ実装していない、次の反復候補として変わらず残る）
- 【重要】本実験は「渦リングが自己形成するか」を主張しない。リングは e003 と同様に imprint された
  seeded structure——本実験が検証するのは新しい計測器（vortex_lines_3d）が既知のリングを正しく
  検出・追跡できるかのみ
- 【既知の限界（正直に報告、隠蔽しない）】dangling half-edge の最近傍ヒューリスティック的再接続は、
  静的で完全対称な合成リングでは常に正しく機能する（6件の合成テスト全てPASS、外部レビュー対応の
  回帰テスト2件を含む）が、実時間発展した実際のGPE場では、接線領域の局所ギャップを誤って小さな
  自己閉合ループとして「治癒」してしまうことがある。時間的連続性マッチング＋半径妥当性ゲート
  （前フレームの重心に最も近く、かつold trackerの半径と妥当な範囲内のループを選ぶ）でこの問題は
  cold radius-matching単独よりは緩和されるが、完全には解決しない——full run（21サンプル）では
  前半70%（7/10）・後半27%（3/11）の一致率。次の反復候補：チェーン端点単位での再接続
  （個々の面ではなく）、またはKalman的な時間平滑化
- 【e003との関係（no_touch）】e003 の物理コード・experiment.yaml・results は一切変更していない。
  本実験は e003 と同一の物理パラメータを再利用する独立した新規計測（vortex_lines_3d.py と
  core.vortex.track_ring_cross_section を同一フレームに両方適用し相互確認する）
- 【次の反復候補】(a) チェーン端点単位の再接続で healing heuristic を改善、(b) 改善後に
  H021-3D（自己形成渦ループ、torus創発の入口、Evidence Contract v2 の F1「One-Handle Selection」
  段階ゲート）へ進む——本実験はその前提条件（計測器がまず動く）を確立する
known_match: 渦リング自己誘導速度（e003で既に確認済み、本実験は新規に再導出しない）。本実験が新規に
  確認したのは、独立に設計された2つの計測器（フレーム毎の相互最近傍ペア検出による渦線トレーサー、
  および既存の子午面2コア追跡器）が同一リングの半径・軸方向位置について（early clean windowでは）
  一致すること
